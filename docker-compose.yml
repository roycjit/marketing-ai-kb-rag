version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: funnel_rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-funnel_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-funnel_rag_local}
      POSTGRES_DB: ${POSTGRES_DB:-funnel_rag}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./scripts/init_pgvector.sql:/docker-entrypoint-initdb.d/01_init_pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-funnel_rag} -d ${POSTGRES_DB:-funnel_rag}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
